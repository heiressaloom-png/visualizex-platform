<style>
:root{

}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{min-height:100vh;background:radial-gradient(circle at 72% -4%,rgba(0,180,160,.16),transparent 34%),radial-gradient(circle at 8% 14%,rgba(199,162,74,.1),transparent 30%),linear-gradient(150deg,var(--emerald-950),var(--emerald-900) 45%,var(--emerald-850));color:var(--cream);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
button,input{font:inherit}button{cursor:pointer}a{color:inherit;text-decoration:none}.fd{font-family:'Cormorant Garamond',serif}.hide{display:none!important}
.app{display:flex;min-height:100vh}.sidebar{width:var(--side);position:fixed;inset:0 auto 0 0;background:rgba(3,21,19,.86);backdrop-filter:blur(20px);border-right:1px solid var(--line);display:flex;flex-direction:column;z-index:50}.brand{display:flex;align-items:center;gap:10px;padding:24px 22px 21px;border-bottom:1px solid var(--line)}.orb{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--teal),#006B5E);color:var(--emerald-950);font-size:13px;box-shadow:0 0 30px rgba(0,180,160,.18)}.brand-name{font-family:'Cormorant Garamond',serif;font-size:1.42rem;letter-spacing:.03em}.brand-x{color:var(--gold-soft)}.nav{padding:18px 12px;overflow:auto;flex:1}.nav-title{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted3);padding:14px 12px 7px}.nav-btn{width:100%;display:flex;align-items:center;gap:11px;background:transparent;border:1px solid transparent;color:var(--muted2);padding:10px 12px;border-radius:8px;margin:2px 0;text-align:left;font-size:.84rem;font-weight:300;transition:.22s}.nav-btn:hover{background:rgba(248,239,224,.04);color:var(--cream-soft)}.nav-btn.active{background:rgba(0,180,160,.1);border-color:rgba(0,180,160,.18);color:var(--teal-soft)}.nav-ico{width:18px;text-align:center;color:currentColor}.side-bottom{border-top:1px solid var(--line);padding:15px 12px 18px}.user-pill{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:rgba(248,239,224,.035);border:1px solid var(--line)}.avatar{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--gold-soft),var(--gold));color:var(--emerald-950);font-size:.75rem;font-weight:600}.user-name{font-size:.84rem;color:var(--cream)}.user-plan{font-size:.7rem;color:var(--muted2);margin-top:1px}.main{margin-left:var(--side);width:calc(100% - var(--side));min-height:100vh}.topbar{height:68px;position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(6,27,25,.72);backdrop-filter:blur(20px);border-bottom:1px solid var(--line)}.mobile-menu{display:none;background:transparent;border:none;color:var(--cream);font-size:1.35rem}.page-title{font-family:'Cormorant Garamond',serif;font-size:1.34rem;color:var(--cream-soft)}.search{position:relative;display:flex;align-items:center;gap:10px;min-width:330px;max-width:520px;flex:1;margin:0 28px;background:rgba(248,239,224,.045);border:1px solid var(--line2);border-radius:999px;padding:10px 15px;transition:.22s}.search:focus-within{border-color:rgba(0,180,160,.45);box-shadow:0 0 0 4px rgba(0,180,160,.08);background:rgba(248,239,224,.065)}.search input{width:100%;background:transparent;border:none;outline:none;color:var(--cream);font-size:.88rem;font-weight:300}.search input::placeholder{color:var(--muted2)}.kbd{border:1px solid var(--line2);border-radius:5px;padding:2px 6px;font-size:.68rem;color:var(--muted3)}.status-row{display:flex;align-items:center;gap:10px}.badge{display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(199,162,74,.25);background:rgba(199,162,74,.1);color:var(--gold-soft);padding:7px 12px;border-radius:999px;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}.content{padding:34px 32px 64px;max-width:1280px;margin:0 auto}.hero{position:relative;overflow:hidden;border:1px solid rgba(0,180,160,.14);border-radius:22px;background:radial-gradient(circle at 80% 20%,rgba(0,180,160,.12),transparent 30%),linear-gradient(135deg,rgba(16,59,55,.86),rgba(8,33,31,.94));padding:32px 34px;box-shadow:var(--shadow);margin-bottom:28px}.hero:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(199,162,74,.06),transparent 40%);pointer-events:none}.eyebrow{font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:var(--teal-soft);margin-bottom:12px}.hero h1{font-size:clamp(2rem,4vw,3.2rem);font-weight:300;line-height:1.06;color:var(--cream);max-width:690px}.hero h1 em{color:var(--gold-soft);font-style:italic}.hero p{max-width:550px;margin-top:12px;font-size:.94rem;font-weight:300;line-height:1.78;color:var(--muted)}.hero-actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:24px}.btn-primary{border:none;border-radius:999px;background:linear-gradient(135deg,var(--gold-soft),var(--gold));color:var(--emerald-950);font-size:.76rem;font-weight:700;letter-spacing:.11em;text-transform:uppercase;padding:12px 22px;transition:.22s}.btn-primary:hover{transform:translateY(-1px);box-shadow:0 14px 30px rgba(199,162,74,.22)}.btn-ghost{border:1px solid var(--line2);border-radius:999px;background:rgba(248,239,224,.025);color:var(--cream-soft);font-size:.76rem;letter-spacing:.11em;text-transform:uppercase;padding:11px 19px;transition:.22s}.btn-ghost:hover{border-color:rgba(0,180,160,.38);color:var(--teal-soft)}.grid{display:grid;gap:18px}.grid-2{grid-template-columns:1.15fr .85fr}.grid-3{grid-template-columns:repeat(3,1fr)}.section{margin-top:30px}.section-head{display:flex;align-items:end;justify-content:space-between;gap:16px;margin-bottom:14px}.section-head h2{font-family:'Cormorant Garamond',serif;font-size:1.32rem;font-weight:400;color:var(--cream-soft)}.section-head p,.see{font-size:.78rem;color:var(--muted2)}.see{letter-spacing:.08em;text-transform:uppercase;color:var(--teal-soft);background:none;border:none}.card{background:rgba(16,47,44,.72);border:1px solid var(--line);border-radius:18px;box-shadow:0 18px 46px rgba(0,0,0,.18)}.continue{display:flex;gap:20px;align-items:center;padding:22px}.play-orb{width:58px;height:58px;border-radius:50%;display:grid;place-items:center;flex:0 0 auto;background:linear-gradient(135deg,var(--teal-soft),var(--teal));box-shadow:0 12px 26px rgba(0,180,160,.28);color:var(--emerald-950)}.meta{font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-soft);margin-bottom:6px}.title{font-family:'Cormorant Garamond',serif;font-size:1.18rem;font-weight:400;color:var(--cream);line-height:1.28}.desc{font-size:.82rem;line-height:1.65;color:var(--muted);font-weight:300}.progress-wrap{margin-top:12px}.progress-line{height:4px;border-radius:999px;background:rgba(248,239,224,.08);overflow:hidden}.progress-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--teal),var(--teal-soft));width:54%}.progress-label{display:flex;justify-content:space-between;margin-top:6px;font-size:.69rem;color:var(--muted2)}.feature{padding:22px;min-height:100%;display:flex;flex-direction:column;justify-content:space-between}.feature-top{display:flex;justify-content:space-between;gap:12px}.duration{font-size:.72rem;color:var(--muted2);white-space:nowrap}.small-play{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;background:rgba(0,180,160,.12);border:1px solid rgba(0,180,160,.22);color:var(--teal-soft);transition:.2s}.experience-card:hover .small-play,.feature:hover .small-play{background:var(--teal);color:var(--emerald-950)}.experience-card{padding:19px;border-radius:16px;background:rgba(20,59,55,.56);border:1px solid var(--line);cursor:pointer;transition:.24s}.experience-card:hover{border-color:rgba(0,180,160,.28);transform:translateY(-2px);background:rgba(20,59,55,.78)}.card-row{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}.chips{display:flex;gap:8px;flex-wrap:wrap}.chip{border:1px solid var(--line);background:rgba(248,239,224,.035);border-radius:999px;padding:8px 12px;color:var(--muted);font-size:.78rem;font-weight:300;cursor:pointer;transition:.2s}.chip:hover,.chip.active{background:rgba(0,180,160,.1);border-color:rgba(0,180,160,.25);color:var(--teal-soft)}.situation-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}.situation{padding:18px;border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,rgba(20,59,55,.56),rgba(8,33,31,.5));cursor:pointer;transition:.22s}.situation:hover{transform:translateY(-2px);border-color:rgba(199,162,74,.26)}.sit-icon{font-size:1.2rem;color:var(--teal-soft);margin-bottom:12px}.sit-name{font-size:.92rem;color:var(--cream-soft);line-height:1.35}.sit-count{font-size:.68rem;color:var(--gold-soft);margin-top:6px}.view{display:none}.view.active{display:block}.library-layout{display:grid;grid-template-columns:250px 1fr;gap:20px}.filter-panel{padding:17px;height:max-content;position:sticky;top:88px}.filter-title{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted3);margin:14px 0 9px}.filter-btn{width:100%;border:1px solid transparent;background:transparent;color:var(--muted2);border-radius:10px;padding:9px 10px;text-align:left;font-size:.78rem;margin:1px 0}.filter-btn:hover,.filter-btn.active{background:rgba(0,180,160,.08);border-color:rgba(0,180,160,.14);color:var(--teal-soft)}.session-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}.empty{border:1px dashed var(--line2);border-radius:18px;padding:36px;text-align:center;background:rgba(248,239,224,.02)}.empty h3{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:1.25rem;color:var(--cream-soft);margin-bottom:8px}.empty p{font-size:.86rem;color:var(--muted2);line-height:1.65}.search-panel{display:none;position:fixed;top:68px;left:var(--side);right:0;background:rgba(3,21,19,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--line);z-index:45;padding:18px 32px;box-shadow:var(--shadow)}.search-panel.open{display:block}.result{display:flex;justify-content:space-between;gap:14px;align-items:center;border-bottom:1px solid var(--line);padding:13px 0;cursor:pointer}.result:last-child{border-bottom:none}.result:hover .title{color:var(--teal-soft)}.player{display:none;position:fixed;inset:0;z-index:100;background:rgba(2,12,11,.94);backdrop-filter:blur(24px);align-items:center;justify-content:center;padding:24px}.player.open{display:flex}.player-card{width:min(680px,100%);border:1px solid rgba(0,180,160,.18);border-radius:26px;background:radial-gradient(circle at 50% -20%,rgba(0,180,160,.16),transparent 36%),linear-gradient(145deg,var(--emerald-800),var(--emerald-925));padding:34px;box-shadow:var(--shadow);position:relative;text-align:center}.close{position:absolute;top:18px;right:20px;background:transparent;border:none;color:var(--muted2);font-size:1.2rem}.player-art{width:132px;height:132px;border-radius:50%;margin:22px auto;border:1px solid rgba(0,180,160,.3);background:radial-gradient(circle,rgba(0,180,160,.16),rgba(199,162,74,.08) 45%,rgba(3,21,19,.92));display:grid;place-items:center}.player-art:after{content:"";width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--teal-soft),var(--teal));box-shadow:0 0 40px rgba(0,180,160,.22)}.player-art.playing{animation:spin 9s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.controls{display:flex;align-items:center;justify-content:center;gap:18px;margin:20px 0}.control{border:none;background:transparent;color:var(--muted);font-size:.82rem}.main-play{width:58px;height:58px;border-radius:50%;border:none;display:grid;place-items:center;background:linear-gradient(135deg,var(--teal-soft),var(--teal));color:var(--emerald-950);box-shadow:0 12px 30px rgba(0,180,160,.3)}.time-row{display:flex;justify-content:space-between;font-size:.72rem;color:var(--muted2);margin-top:8px}.player-note{text-align:left;margin-top:20px;border-top:1px solid var(--line);padding-top:18px}.overlay{position:fixed;inset:0;background:rgba(2,12,11,.88);backdrop-filter:blur(18px);display:none;z-index:90;align-items:center;justify-content:center;padding:22px}.overlay.open{display:flex}.auth-box{width:min(430px,100%);background:var(--emerald-900);border:1px solid rgba(199,162,74,.22);border-radius:22px;padding:28px;box-shadow:var(--shadow)}.field{margin:13px 0}.field label{display:block;font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted2);margin-bottom:6px}.field input{width:100%;border:1px solid var(--line2);border-radius:10px;background:rgba(248,239,224,.045);padding:12px 13px;color:var(--cream);outline:none}.field input:focus{border-color:rgba(0,180,160,.4)}.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--emerald-950);border:1px solid rgba(0,180,160,.2);color:var(--cream-soft);padding:12px 16px;border-radius:999px;font-size:.82rem;opacity:0;pointer-events:none;transition:.25s;z-index:120}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:980px){:root{--side:0px}.sidebar{transform:translateX(-100%);transition:.25s}.sidebar.open{transform:translateX(0);width:268px}.main{margin-left:0;width:100%}.mobile-menu{display:block}.topbar{padding:0 18px}.search{min-width:0;margin:0 12px}.search-panel{left:0}.grid-2,.grid-3,.library-layout{grid-template-columns:1fr}.filter-panel{position:relative;top:0}.content{padding:22px 18px 56px}.hero{padding:26px 22px}.status-row .badge{display:none}.continue{align-items:flex-start}.session-list{grid-template-columns:1fr}.sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:40}.sidebar-backdrop.open{display:block}}
@media(max-width:620px){.page-title{display:none}.kbd{display:none}.continue{flex-direction:column}.play-orb{width:50px;height:50px}.hero-actions .btn-primary,.hero-actions .btn-ghost{width:100%;text-align:center}.section-head{align-items:flex-start;flex-direction:column}.player-card{padding:28px 20px}.player-art{width:112px;height:112px}.content{padding-left:14px;padding-right:14px}}
</style>
</head>
<body>
<div class="sidebar-backdrop" id="sideBackdrop" onclick="toggleSidebar(false)"></div>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand"><div class="orb">◎</div><div class="brand-name">Visualize<span class="brand-x">X</span></div></div>
    <nav class="nav">
      <div class="nav-title">Listen</div>
      <button class="nav-btn active" data-view="home"><span class="nav-ico">◈</span> Dashboard</button>
      <button class="nav-btn" data-view="library"><span class="nav-ico">▤</span> Library</button>
      <button class="nav-btn" data-view="situations"><span class="nav-ico">◎</span> Situations</button>
      <button class="nav-btn" data-view="saved"><span class="nav-ico">♡</span> Saved</button>
      <button class="nav-btn" data-view="recent"><span class="nav-ico">↺</span> Recent</button>
      <div class="nav-title">Account</div>
      <button class="nav-btn" data-view="membership"><span class="nav-ico">◇</span> Membership</button>
      <button class="nav-btn" data-view="settings"><span class="nav-ico">⚙</span> Settings</button>
      <button class="nav-btn" onclick="openAuth()"><span class="nav-ico">↪</span> Sign in / Demo user</button>
    </nav>
    <div class="side-bottom">
    <div class="user-pill" style="cursor:pointer" onclick="openAuth()">
      <div class="avatar" id="avatar">VX</div>
      <div>
        <div class="user-name" id="userName">Listener</div>
        <div class="user-plan" id="userPlan">Trial active</div>
      </div>
    </div>
    <button onclick="window.location.href='VisualizeX_Fixed.html'" style="width:100%;margin-top:10px;background:transparent;border:1px solid rgba(248,239,224,.1);border-radius:999px;color:rgba(248,239,224,.3);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;padding:9px;cursor:pointer;transition:all .2s;" onmouseover="this.style.color='rgba(0,180,160,.7)'" onmouseout="this.style.color='rgba(248,239,224,.3)'">&#x2190; Back to site</button>
  </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <button class="mobile-menu" onclick="toggleSidebar()">☰</button>
      <div class="page-title" id="pageTitle">Dashboard</div>
      <div class="search"><span style="color:var(--muted2)">⌕</span><input id="searchInput" placeholder="Find a situation, feeling, or experience…" oninput="renderSearch(this.value)" onfocus="renderSearch(this.value || ' ')"/><span class="kbd">⌘K</span></div>
      <div class="status-row"><span class="badge">Trial active</span></div>
    </div>
    <div class="search-panel" id="searchPanel"></div>
    <div class="content">
      <section id="home" class="view active"></section>
      <section id="library" class="view"></section>
      <section id="situations" class="view"></section>
      <section id="saved" class="view"></section>
      <section id="recent" class="view"></section>
      <section id="membership" class="view"></section>
      <section id="settings" class="view"></section>
    </div>
  </main>
</div>
<div class="player" id="player">
  <div class="player-card">
    <button class="close" onclick="closePlayer()">✕</button>
    <div class="meta" id="pCat"></div>
    <h2 class="fd" id="pTitle" style="font-size:2rem;font-weight:400;line-height:1.15"></h2>
    <div class="player-art" id="pArt"></div>
    <div class="controls"><button class="control" onclick="skip(-15)">↶ 15s</button><button class="main-play" id="playBtn" onclick="togglePlay()">▶</button><button class="control" onclick="skip(15)">15s ↷</button></div>
    <div class="progress-wrap"><div class="progress-line" onclick="seek(event)"><div class="progress-fill" id="pProg" style="width:0%"></div></div><div class="time-row"><span id="pNow">0:00</span><span id="pDur">7:00</span></div></div>
    <div class="player-note"><p class="desc" id="pDesc"></p><div class="hero-actions" style="justify-content:center"><button class="btn-ghost" onclick="saveCurrent()">♡ Save</button><button class="btn-ghost" onclick="closePlayer()">Done</button></div></div>
  </div>
</div>
<div class="overlay" id="auth"><div class="auth-box"><div class="brand" style="border:0;padding:0 0 16px"><div class="orb">◎</div><div class="brand-name">Visualize<span class="brand-x">X</span></div></div><p class="desc">Use this demo sign-in to test dashboard states, saved sessions, and recent listening.</p><div class="field"><label>Name</label><input id="authName" value="Demo Listener"></div><div class="field"><label>Email</label><input id="authEmail" value="demo@visualizex.com"></div><button class="btn-primary" style="width:100%;margin-top:12px" onclick="signIn()">Enter dashboard</button><button class="btn-ghost" style="width:100%;margin-top:10px" onclick="closeAuth()">Cancel</button></div></div>
<div class="toast" id="toast"></div>
<script>
const sessions=[
  // Pressure & Self-Regulation
  {id:1, cat:'Pressure & Composure',        title:'Let the Moment Pass Without Entering It',         dur:6,  desc:'For the moment when emotional charge rises and you want to react before you have understood what is happening.'},
  {id:2, cat:'Difficult Conversations',     title:'When the Conversation Needs to Happen',           dur:8,  desc:'For the conversation you keep postponing because avoiding it feels easier than entering it with clarity.'},
  {id:3, cat:'Feeling Misunderstood',       title:'When You Start Over-Explaining',                  dur:7,  desc:'For the moment you feel yourself adding more words, hoping precision will create safety, but sensing the room is drifting.'},
  {id:4, cat:'High-Pressure Rooms',         title:'When the Room Tests the Limits of an Idea',       dur:8,  desc:'For situations where curiosity turns to scrutiny and your idea has to survive pressure without you becoming defensive.'},
  {id:5, cat:'Identity & Self-Worth',       title:'When Status Dynamics Shape Decisions',            dur:9,  desc:'For rooms where hierarchy is not announced but still shapes how people listen, defer, challenge, and decide.'},
  {id:6, cat:'Commercial Decisions',        title:'When the Deal Looks Right But Feels Off',         dur:7,  desc:'For the moment when the numbers make sense but something in the dynamic asks you to slow down.'},
  {id:7, cat:'Recovery & Reset',            title:'After a Difficult Moment',                        dur:6,  desc:'For the aftermath — when something has happened and your mind keeps replaying it, trying to extract meaning.'},
  {id:8, cat:'Leadership Pressure',         title:'Scaling Without Burning the Team',                dur:9,  desc:'For leaders carrying ambition and urgency without wanting exhaustion to become the operating system.'},
  {id:9, cat:'Relationships & Boundaries',  title:'When You Confuse Intensity With Clarity',         dur:10, desc:'For situations where emotional intensity feels like truth but discernment requires space and steadiness.'},
  // Authority & Investor Dynamics
  {id:10, cat:'Authority & Power Dynamics', title:'When a Powerful Person Signals Doubt',            dur:8,  desc:'A senior figure signals scepticism. The room shifts. How you respond in the next few seconds determines the dynamic.'},
  {id:11, cat:'Authority & Power Dynamics', title:'When Investors Test Your Conviction',             dur:7,  desc:'For the pitch room moment when the question is not really about the numbers — it is about whether you believe it.'},
  {id:12, cat:'Authority & Power Dynamics', title:'The Walk-Away Decision',                          dur:5,  desc:'For the moment you need to know whether this is the right deal — and how to leave without burning what matters.'},

const situations=['Pressure & composure','Difficult conversations','High-pressure rooms','Authority dynamics','Identity & self-worth','Relationships & boundaries','Commercial decisions','Leadership pressure','Recovery & reset','Feeling misunderstood'];
// Bridge auth state from landing page
var _lpUser = null;
try {
  var _lpRaw = localStorage.getItem('vx_u');
  if (_lpRaw) { _lpUser = JSON.parse(_lpRaw); }
} catch(e) {}

let state=JSON.parse(localStorage.getItem('vx_mvp_state')||'{}');
// Merge landing page user into dashboard state
if (_lpUser && _lpUser.name) {
  state.user = { name: _lpUser.name, email: _lpUser.email || 'member@visualizex.com' };
  state.plan  = _lpUser.plan || 'monthly';
}
state.recent=state.recent||[{id:4,progress:54},{id:1,progress:22}];state.saved=state.saved||[2];state.user=state.user||{name:'Demo Listener',email:'demo@visualizex.com'};let current=null,playing=false,timer=null,sec=0;
function persist(){localStorage.setItem('vx_mvp_state',JSON.stringify(state))}function $(id){return document.getElementById(id)}function toast(t){$('toast').textContent=t;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),1800)}
function session(id){return sessions.find(s=>s.id===id)}function card(s){return `<div class="experience-card" onclick="openPlayer(${s.id})"><div class="card-row"><div><div class="meta">${s.cat}</div><div class="title">${s.title}</div></div><div class="duration">${s.dur} min</div></div><p class="desc" style="margin-top:9px">${s.desc}</p><div class="card-row" style="margin-top:15px"><button class="small-play">▶</button><button class="btn-ghost" onclick="event.stopPropagation();toggleSave(${s.id})">${state.saved.includes(s.id)?'Saved':'Save'}</button></div></div>`}
function renderHome(){const cont=state.recent[0],s=session(cont.id);$('home').innerHTML=`<div class="hero"><div class="eyebrow">Dashboard</div><h1 class="fd">Find the experience that fits <em>where you are now.</em></h1><p>This dashboard is built around listening and discovery — not training modules. The goal is to make the right experience easy to resume, browse, save, and play.</p><div class="hero-actions"><button class="btn-primary" onclick="openPlayer(${s.id})">Continue listening</button><button class="btn-ghost" onclick="showView('library')">Browse library</button></div></div><div class="grid grid-2"><div><div class="section-head"><h2>Continue Listening</h2><p>Resume without searching again</p></div><div class="card continue" onclick="openPlayer(${s.id})"><div class="play-orb">▶</div><div style="flex:1"><div class="meta">${s.cat}</div><div class="title">${s.title}</div><p class="desc" style="margin-top:6px">${s.desc}</p><div class="progress-wrap"><div class="progress-line"><div class="progress-fill" style="width:${cont.progress}%"></div></div><div class="progress-label"><span>${cont.progress}% listened</span><span>${Math.max(1,Math.round(s.dur*(100-cont.progress)/100))} min left</span></div></div></div></div></div><div><div class="section-head"><h2>Featured</h2><p>Curated, not personalised</p></div><div class="card feature" onclick="openPlayer(2)"><div><div class="feature-top"><div><div class="meta">Difficult Conversations</div><div class="title">When the Conversation Needs to Happen</div></div><span class="duration">8 min</span></div><p class="desc" style="margin-top:12px">A strong first dashboard feature because it is emotionally universal and easy to understand.</p></div><div style="display:flex;justify-content:space-between;align-items:center;margin-top:20px"><button class="small-play">▶</button><span class="see">Listen now →</span></div></div></div></div><div class="section"><div class="section-head"><h2>Start by Situation</h2><button class="see" onclick="showView('situations')">View all</button></div><div class="situation-grid">${situations.slice(0,6).map((x,i)=>`<div class="situation" onclick="filterLibrary('${x}')"><div class="sit-icon">${['◈','◎','◉','◇','◌','◆'][i]}</div><div class="sit-name">${x}</div><div class="sit-count">${2+i} experiences</div></div>`).join('')}</div></div><div class="section"><div class="section-head"><h2>Recently Explored</h2><button class="see" onclick="showView('recent')">See all</button></div><div class="session-list">${state.recent.map(r=>card(session(r.id))).join('')}</div></div>`}
function renderLibrary(filter='All'){const cats=['All',...new Set(sessions.map(s=>s.cat))];let list=sessions;if(filter&&filter!=='All')list=sessions.filter(s=>(s.cat+' '+s.title+' '+s.desc).toLowerCase().includes(filter.toLowerCase()));$('library').innerHTML=`<div class="section-head"><div><h2>Library</h2><p>Browse by situation, feeling, or context.</p></div></div><div class="library-layout"><aside class="card filter-panel"><div class="filter-title">Categories</div>${cats.map(c=>`<button class="filter-btn ${c===filter?'active':''}" onclick="renderLibrary('${c}')">${c}</button>`).join('')}<div class="filter-title">Useful entry points</div>${situations.slice(0,5).map(x=>`<button class="filter-btn" onclick="filterLibrary('${x}')">${x}</button>`).join('')}</aside><div><div class="chips" style="margin-bottom:16px">${situations.map(x=>`<button class="chip" onclick="filterLibrary('${x}')">${x}</button>`).join('')}</div><div class="session-list">${list.length?list.map(card).join(''):'<div class="empty"><h3>No exact match yet.</h3><p>Try a broader word like pressure, conversation, identity, room, or recovery.</p></div>'}</div></div></div>`}
function renderSituations(){$('situations').innerHTML=`<div class="section-head"><div><h2>Situations</h2><p>Human entry points work better than generic dashboard categories.</p></div></div><div class="situation-grid">${situations.map((x,i)=>`<div class="situation" onclick="filterLibrary('${x}')"><div class="sit-icon">${['◈','◎','◉','◇','◌','◆','◍','◐'][i]}</div><div class="sit-name">${x}</div><div class="sit-count">Explore →</div></div>`).join('')}</div>`}
function renderSaved(){const list=sessions.filter(s=>state.saved.includes(s.id));$('saved').innerHTML=`<div class="section-head"><div><h2>Saved Experiences</h2><p>Experiences the listener wants to return to.</p></div></div>${list.length?'<div class="session-list">'+list.map(card).join('')+'</div>':'<div class="empty"><h3>You haven’t saved anything yet.</h3><p>Start exploring and save experiences that feel relevant enough to revisit.</p></div>'}`}
function renderRecent(){const list=state.recent.map(r=>session(r.id));$('recent').innerHTML=`<div class="section-head"><div><h2>Recent Listening</h2><p>Continuity is the most important dashboard trust signal for MVP 1.</p></div></div><div class="session-list">${list.map(card).join('')}</div>`}
function renderMembership(){
  var plan = state.plan || 'trial';
  var trialMsg = plan === 'trial' ? '<em>7-day trial active.</em>' : '<em>' + (plan.charAt(0).toUpperCase()+plan.slice(1)) + ' member.</em>';
  $('membership').innerHTML = '<div class="hero"><div class="eyebrow">Membership</div><h1 class="fd">'+trialMsg+'</h1>' +
    '<p>Your access is calm, clear, and without pressure. Upgrade when it feels right \u2014 or stay on trial for the full 7 days.</p>' +
    '<div class="hero-actions"><button class="btn-primary" onclick="toast(\'Redirecting to billing\u2026\')">Upgrade plan</button>' +
    '<button class="btn-ghost" onclick="toast(\'Cancel anytime \u2014 your history stays\')">Manage billing</button></div></div>' +
    '<div class="grid grid-3">' +
    '<div class="card feature"><div class="meta">Monthly</div><div class="title">$14 / month</div><p class="desc">Full library access. Cancel anytime. No penalty.</p></div>' +
    '<div class="card feature" style="border-color:rgba(199,162,74,.25)"><div class="meta" style="color:var(--gold-soft)">Quarterly \u2014 Best value</div><div class="title">$39 / quarter</div><p class="desc">Three months of full access. Most listeners\u2019 choice.</p></div>' +
    '<div class="card feature"><div class="meta">Annual</div><div class="title">$140 / year</div><p class="desc">Save 17% versus monthly. Full library, always.</p></div></div>' +
    '<div style="margin-top:20px;padding:16px 20px;border:1px solid rgba(248,239,224,.07);border-radius:16px;font-size:.82rem;color:var(--muted2);line-height:1.7">' +
    '&#x2713; No card required during trial &nbsp;&middot;&nbsp; &#x2713; Cancel in two taps &nbsp;&middot;&nbsp; &#x2713; Your history stays if you return &nbsp;&middot;&nbsp; &#x2713; Full refund in first 7 days</div>';
}
function renderSettings(){$('settings').innerHTML=`<div class="section-head"><div><h2>Settings</h2><p>Keep this light for MVP 1.</p></div></div><div class="card feature"><div class="field"><label>Name</label><input value="${state.user.name}" onchange="state.user.name=this.value;persist();syncUser()"></div><div class="field"><label>Email</label><input value="${state.user.email}" onchange="state.user.email=this.value;persist();syncUser()"></div><button class="btn-primary" onclick="toast('Settings saved')">Save settings</button></div>`}
function renderAll(){renderHome();renderLibrary();renderSituations();renderSaved();renderRecent();renderMembership();renderSettings();syncUser()}function showView(v){document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));$(v).classList.add('active');document.querySelectorAll('.nav-btn[data-view]').forEach(x=>x.classList.toggle('active',x.dataset.view===v));$('pageTitle').textContent={home:'Dashboard',library:'Library',situations:'Situations',saved:'Saved',recent:'Recent',membership:'Membership',settings:'Settings'}[v]||'Dashboard';toggleSidebar(false);$('searchPanel').classList.remove('open')}
function filterLibrary(term){showView('library');renderLibrary(term)}function toggleSave(id){if(state.saved.includes(id))state.saved=state.saved.filter(x=>x!==id);else state.saved.unshift(id);persist();renderAll();toast(state.saved.includes(id)?'Saved':'Removed from saved')}function saveCurrent(){if(current)toggleSave(current.id)}
function renderSearch(q){const panel=$('searchPanel');if(!q){panel.classList.remove('open');return}panel.classList.add('open');const term=q.trim().toLowerCase();let list=term?sessions.filter(s=>(s.title+s.cat+s.desc).toLowerCase().includes(term)):sessions.slice(0,5);panel.innerHTML=list.length?list.slice(0,6).map(s=>`<div class="result" onclick="openPlayer(${s.id});$('searchPanel').classList.remove('open')"><div><div class="meta">${s.cat}</div><div class="title">${s.title}</div><p class="desc">${s.desc}</p></div><span class="duration">${s.dur} min</span></div>`).join(''):`<div class="empty"><h3>No exact match.</h3><p>Try pressure, conversation, status, decision, or recovery.</p></div>`}
function openPlayer(id){current=session(id);sec=Math.round((state.recent.find(r=>r.id===id)?.progress||0)/100*current.dur*60);$('pCat').textContent=current.cat;$('pTitle').textContent=current.title;$('pDesc').textContent=current.desc;$('pDur').textContent=current.dur+':00';$('player').classList.add('open');updateProgress();playing=false;togglePlay();state.recent=state.recent.filter(r=>r.id!==id);state.recent.unshift({id,progress:Math.round(sec/(current.dur*60)*100)});state.recent=state.recent.slice(0,5);persist();renderAll()}function closePlayer(){playing=false;clearInterval(timer);$('player').classList.remove('open');$('pArt').classList.remove('playing');$('playBtn').textContent='▶'}function togglePlay(){playing=!playing;$('playBtn').textContent=playing?'Ⅱ':'▶';$('pArt').classList.toggle('playing',playing);clearInterval(timer);if(playing)timer=setInterval(()=>{sec++;if(sec>=current.dur*60){sec=current.dur*60;playing=false;clearInterval(timer);toast('Experience complete')}updateProgress();const r=state.recent.find(x=>x.id===current.id);if(r){r.progress=Math.round(sec/(current.dur*60)*100);persist()}},1000)}function updateProgress(){if(!current)return;const pct=Math.min(100,sec/(current.dur*60)*100);$('pProg').style.width=pct+'%';$('pNow').textContent=Math.floor(sec/60)+':'+String(sec%60).padStart(2,'0')}function seek(e){const rect=e.currentTarget.getBoundingClientRect();sec=Math.round((e.clientX-rect.left)/rect.width*current.dur*60);updateProgress()}function skip(n){sec=Math.max(0,Math.min(current.dur*60,sec+n));updateProgress()}function toggleSidebar(force){const open=force!==undefined?force:!$('sidebar').classList.contains('open');$('sidebar').classList.toggle('open',open);$('sideBackdrop').classList.toggle('open',open)}
function openAuth(){$('auth').classList.add('open')}function closeAuth(){$('auth').classList.remove('open')}function signIn(){state.user={name:$('authName').value||'Demo Listener',email:$('authEmail').value||'demo@visualizex.com'};persist();syncUser();closeAuth();toast('Signed in as demo user')}function syncUser(){
  var nm = state.user && state.user.name ? state.user.name : 'Listener';
  var initials = nm.split(' ').map(function(x){return x[0];}).join('').slice(0,2).toUpperCase() || 'VX';
  $('userName').textContent = nm;
  $('avatar').textContent   = initials;
  var planEl = $('userPlan');
  if (planEl) {
    var plan = state.plan || (_lpUser && _lpUser.plan) || 'trial';
    var planLabels = {monthly:'Monthly member', quarterly:'Quarterly member', annual:'Annual member', trial:'Trial active'};
    planEl.textContent = planLabels[plan] || 'Trial active';
  }
}
document.querySelectorAll('.nav-btn[data-view]').forEach(b=>b.addEventListener('click',()=>showView(b.dataset.view)));document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();$('searchInput').focus()}if(e.key==='Escape'){closePlayer();$('searchPanel').classList.remove('open');toggleSidebar(false)}});renderAll();
</script>
